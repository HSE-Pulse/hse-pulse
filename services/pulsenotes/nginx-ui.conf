server {
    listen 4000;
    server_name _;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets from /pulsenotes/ path
    location /pulsenotes/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    # Health check returns 200, browsers redirect to /pulsenotes/
    location = / {
        if ($http_user_agent ~* "GoogleHC") {
            return 200 'OK';
        }
        return 302 /pulsenotes/;
    }

    location / {
        try_files $uri $uri/ /pulsenotes/index.html;
    }

    location /pulsenotes/config.js {
        alias /usr/share/nginx/html/config.js;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /rag/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
