name: Deploy to GCP VM

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  DOCKER_USERNAME: harishankarsomasundaram

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.GCP_VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to GCP VM
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} << 'ENDSSH'
            set -e

            # Navigate to project directory
            cd ~/hse-pulse || git clone https://github.com/${{ github.repository }}.git ~/hse-pulse && cd ~/hse-pulse

            # Pull latest changes
            git fetch origin main
            git reset --hard origin/main

            # Pull latest images
            docker-compose -f docker-compose.prod.yml pull

            # Restart services with zero downtime
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old images
            docker image prune -f

            # Health check
            sleep 30
            curl -f http://localhost/health || exit 1

            echo "Deployment complete!"
          ENDSSH

      - name: Run smoke tests
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} << 'ENDSSH'
            cd ~/hse-pulse
            chmod +x scripts/smoke_test.sh
            ./scripts/smoke_test.sh
          ENDSSH

      - name: Notify on success
        if: success()
        run: |
          echo "Deployment to ${{ github.event.inputs.environment || 'production' }} successful!"
          echo "Services available at: https://${{ secrets.GCP_VM_HOST }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed! Check logs for details."
          exit 1

  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.GCP_VM_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback deployment
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} << 'ENDSSH'
            cd ~/hse-pulse
            git reset --hard HEAD~1
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "Rolled back to previous version"
          ENDSSH
