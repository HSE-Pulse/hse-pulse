---
# PulseFlow Service - LSTM Patient Flow Prediction
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulseflow
  namespace: hse-pulse
  labels:
    app: pulseflow
    component: ml-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pulseflow
  template:
    metadata:
      labels:
        app: pulseflow
        component: ml-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: pulseflow
          image: hse-pulse/pulseflow:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: hse-pulse-config
          env:
            - name: ROOT_PATH
              value: "/pulseflow"
            - name: MODEL_PATH
              value: "/app/models/lstm_model.pth"
          volumeMounts:
            - name: models
              mountPath: /app/models
              subPath: pulseflow
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: pulseflow-service
  namespace: hse-pulse
spec:
  selector:
    app: pulseflow
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
