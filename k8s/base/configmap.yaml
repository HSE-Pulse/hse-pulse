apiVersion: v1
kind: ConfigMap
metadata:
  name: hse-pulse-config
  namespace: hse-pulse
data:
  MONGO_URI: "mongodb://mongodb-service:27017/"
  MONGO_DB: "healthcare"
  LOG_LEVEL: "INFO"
  DEVICE: "cpu"
  MLFLOW_TRACKING_URI: "http://mlflow-service:5000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init-script
  namespace: hse-pulse
data:
  01-init-database.js: |
    // HSE-Pulse MongoDB Initialization Script
    // Creates collections and seed data for all services

    db = db.getSiblingDB('healthcare');

    // Create hospitals collection
    db.hospitals.insertMany([
        {
            hospital_code: "UHK", name: "University Hospital Kerry", full_name: "University Hospital Kerry",
