apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-activator
  namespace: hse-pulse
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-activator-role
  namespace: hse-pulse
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-activator-rolebinding
  namespace: hse-pulse
subjects:
  - kind: ServiceAccount
    name: demo-activator
    namespace: hse-pulse
roleRef:
  kind: Role
  name: demo-activator-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-activator
  namespace: hse-pulse
  labels:
    app: demo-activator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-activator
  template:
    metadata:
      labels:
        app: demo-activator
    spec:
      serviceAccountName: demo-activator
      containers:
        - name: demo-activator
          image: europe-west1-docker.pkg.dev/hse-pulse-portfolio/hse-pulse/demo-activator:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "5m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          env:
            - name: NAMESPACE
              value: "hse-pulse"
            - name: SCALE_DOWN_AFTER_MINUTES
              value: "10"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: demo-activator
  namespace: hse-pulse
spec:
  selector:
    app: demo-activator
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
