apiVersion: apps/v1
kind: Deployment
metadata:
  name: careplanplus
  namespace: hse-pulse
  labels:
    app: careplanplus
spec:
  replicas: 0  # Start at 0 - on demand
  selector:
    matchLabels:
      app: careplanplus
  template:
    metadata:
      labels:
        app: careplanplus
    spec:
      containers:
        - name: careplanplus
          image: europe-west1-docker.pkg.dev/hse-pulse-portfolio/hse-pulse/careplanplus:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: MONGODB_URI
              value: "mongodb://mongodb:27017"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: careplanplus
  namespace: hse-pulse
spec:
  selector:
    app: careplanplus
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
