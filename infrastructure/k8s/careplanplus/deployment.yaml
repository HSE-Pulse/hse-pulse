apiVersion: apps/v1
kind: Deployment
metadata:
  name: careplanplus
  namespace: hse-pulse
  labels:
    app: careplanplus
spec:
  replicas: 0
  selector:
    matchLabels:
      app: careplanplus
  template:
    metadata:
      labels:
        app: careplanplus
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      tolerations:
        - key: workload
          value: ml
          effect: NoSchedule
      nodeSelector:
        cloud.google.com/gke-nodepool: ml-pool
      containers:
        - name: ui
          image: europe-west1-docker.pkg.dev/hse-pulse-portfolio/hse-pulse/careplanplus-ui:latest
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
        - name: api
          image: europe-west1-docker.pkg.dev/hse-pulse-portfolio/hse-pulse/careplanplus-api:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: MONGO_URI
              value: "mongodb://mongodb:27017/"
            - name: MONGO_DB
              value: "healthcare"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: careplanplus
  namespace: hse-pulse
spec:
  selector:
    app: careplanplus
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
