apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulseflow
  namespace: hse-pulse
  labels:
    app: pulseflow
spec:
  replicas: 0
  selector:
    matchLabels:
      app: pulseflow
  template:
    metadata:
      labels:
        app: pulseflow
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      tolerations:
        - key: workload
          value: ml
          effect: NoSchedule
      nodeSelector:
        cloud.google.com/gke-nodepool: ml-pool
      containers:
        - name: ui
          image: europe-west1-docker.pkg.dev/hse-pulse-portfolio/hse-pulse/pulseflow-ui:latest
          ports:
            - containerPort: 7000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
        - name: api
          image: europe-west1-docker.pkg.dev/hse-pulse-portfolio/hse-pulse/pulseflow-api:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: MONGO_URI
              value: "mongodb://mongodb:27017/"
            - name: MONGO_DB
              value: "healthcare"
            - name: MODEL_PATH
              value: "/models/lstm_model.pth"
            - name: SCALER_PATH
              value: "/models/scaler.pkl"
            - name: METADATA_PATH
              value: "/models/model_metadata.json"
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: pulseflow-models
---
apiVersion: v1
kind: Service
metadata:
  name: pulseflow
  namespace: hse-pulse
spec:
  selector:
    app: pulseflow
  ports:
    - protocol: TCP
      port: 80
      targetPort: 7000
  type: ClusterIP
