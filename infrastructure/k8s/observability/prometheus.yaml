apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: hse-pulse
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-role
  namespace: hse-pulse
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-rolebinding
  namespace: hse-pulse
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: hse-pulse
roleRef:
  kind: Role
  name: prometheus-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: hse-pulse
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'medisync'
        static_configs:
          - targets: ['medisync:80']
        metrics_path: /metrics
      - job_name: 'pulseflow'
        static_configs:
          - targets: ['pulseflow:80']
        metrics_path: /pulseflow/api/metrics
      - job_name: 'pulsenotes'
        static_configs:
          - targets: ['pulsenotes:80']
        metrics_path: /rag/metrics
      - job_name: 'careplanplus'
        static_configs:
          - targets: ['careplanplus:80']
        metrics_path: /careplanplus/api/metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: hse-pulse
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.49.0
          ports:
            - containerPort: 9090
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=7d"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: prometheus-backend-config
  namespace: hse-pulse
spec:
  healthCheck:
    checkIntervalSec: 30
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /-/healthy
    port: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: hse-pulse
  annotations:
    cloud.google.com/backend-config: '{"default": "prometheus-backend-config"}'
spec:
  selector:
    app: prometheus
  ports:
    - protocol: TCP
      port: 80
      targetPort: 9090
  type: ClusterIP
