apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: hse-pulse
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:80
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: hse-pulse
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'Healthcare ML Portfolio'
        orgId: 1
        folder: ''
        folderUid: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
