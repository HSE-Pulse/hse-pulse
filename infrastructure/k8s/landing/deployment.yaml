apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing
  namespace: hse-pulse
  labels:
    app: landing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landing
  template:
    metadata:
      labels:
        app: landing
    spec:
      containers:
        - name: landing
          image: europe-west1-docker.pkg.dev/hse-pulse-portfolio/hse-pulse/landing:latest
          ports:
            - containerPort: 6000
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 6000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 6000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: landing
  namespace: hse-pulse
spec:
  selector:
    app: landing
  ports:
    - protocol: TCP
      port: 80
      targetPort: 6000
  type: ClusterIP
