apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing
  namespace: hse-pulse
  labels:
    app: landing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: landing
  template:
    metadata:
      labels:
        app: landing
    spec:
      containers:
        - name: landing
          image: europe-west1-docker.pkg.dev/hse-pulse-portfolio/hse-pulse/landing:latest
          ports:
            - containerPort: 6000
          env:
            - name: DESMARL_URL
              value: "https://harishankar.info/activate/medisync"
            - name: CAREPLANPLUS_URL
              value: "https://harishankar.info/activate/careplanplus"
            - name: PULSENOTES_URL
              value: "https://harishankar.info/activate/pulsenotes"
            - name: PULSEFLOW_URL
              value: "https://harishankar.info/activate/pulseflow"
            - name: MLFLOW_URL
              value: "https://mlflow.harishankar.info"
            - name: GRAFANA_URL
              value: "https://grafana.harishankar.info"
            - name: PROMETHEUS_URL
              value: "https://prometheus.harishankar.info"
            - name: DASHBOARD_URL
              value: "https://dashboard.harishankar.info"
          resources:
            requests:
              memory: "128Mi"
              cpu: "10m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 6000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 6000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: landing
  namespace: hse-pulse
spec:
  selector:
    app: landing
  ports:
    - protocol: TCP
      port: 80
      targetPort: 6000
  type: ClusterIP
