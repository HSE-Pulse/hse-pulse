apiVersion: apps/v1
kind: Deployment
metadata:
  name: medisync
  namespace: hse-pulse
  labels:
    app: medisync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medisync
  template:
    metadata:
      labels:
        app: medisync
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      tolerations:
        - key: workload
          value: ml
          effect: NoSchedule
      nodeSelector:
        cloud.google.com/gke-nodepool: ml-pool
      containers:
        - name: medisync
          image: europe-west1-docker.pkg.dev/hse-pulse-portfolio/hse-pulse/medisync:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "3Gi"
              cpu: "1000m"
            limits:
              memory: "6Gi"
              cpu: "2000m"
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 30
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 30
            failureThreshold: 6
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: medisync-backend-config
  namespace: hse-pulse
spec:
  timeoutSec: 86400
  connectionDraining:
    drainingTimeoutSec: 60
---
apiVersion: v1
kind: Service
metadata:
  name: medisync
  namespace: hse-pulse
  annotations:
    cloud.google.com/backend-config: '{"default": "medisync-backend-config"}'
spec:
  selector:
    app: medisync
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
