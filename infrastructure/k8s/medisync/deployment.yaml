apiVersion: apps/v1
kind: Deployment
metadata:
  name: medisync
  namespace: hse-pulse
  labels:
    app: medisync
spec:
  replicas: 0  # Start at 0, KEDA will scale up
  selector:
    matchLabels:
      app: medisync
  template:
    metadata:
      labels:
        app: medisync
    spec:
      containers:
        - name: medisync
          image: europe-west1-docker.pkg.dev/hse-pulse-portfolio/hse-pulse/medisync:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: medisync
  namespace: hse-pulse
spec:
  selector:
    app: medisync
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
