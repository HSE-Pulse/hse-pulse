services:
  # ==========================================================================
  # Reverse Proxy
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "8090:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - landing-ui
      - pulseflow
      - careplanplus
      - careplanplus-ui
      - pulsenotes
      - medisync
      - medisync-ui
      - pulsenotes-ui
    networks:
      - frontend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # Healthcare ML Services
  # ==========================================================================
  pulseflow:
    build:
      context: ./services/pulseflow
      dockerfile: Dockerfile
    container_name: pulseflow
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/}
      - MONGO_DB=healthcare
      - MODEL_PATH=${PULSEFLOW_MODEL_PATH:-/app/models/lstm_model.pth}
      - DEVICE=${DEVICE:-cpu}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ROOT_PATH=/pulseflow
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=pulseflow
    volumes:
      - ./models/pulseflow:/app/models:ro
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  careplanplus:
    build:
      context: ./services/careplanplus
      dockerfile: Dockerfile
    container_name: careplanplus
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/}
      - MONGO_DB=healthcare
      - MODEL_PATH=${CAREPLANPLUS_MODEL_PATH:-/app/models/bert_model.pth}
      - DEVICE=${DEVICE:-cpu}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ROOT_PATH=/careplanplus
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=careplanplus
    volumes:
      - ./models/careplanplus:/app/models
      - ./services/careplanplus/data:/app/data:ro
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  careplanplus-ui:
    build:
      context: ./services/careplanplus
      dockerfile: Dockerfile.ui
    container_name: careplanplus-ui
    environment:
      - CAREPLANPLUS_API_BASE=/careplanplus/api
    networks:
      - frontend_net
    restart: unless-stopped
    depends_on:
      careplanplus:
        condition: service_healthy

  pulsenotes:
    build:
      context: ./services/pulsenotes
      dockerfile: Dockerfile
    container_name: pulsenotes
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/}
      - MONGO_DB=healthcare
      - MODEL_PATH=${PULSENOTES_MODEL_PATH:-/app/models/clinicalbert}
      - DEVICE=${DEVICE:-cpu}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ROOT_PATH=/pulsenotes
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=pulsenotes
    volumes:
      - ./models/pulsenotes:/app/models
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  medisync:
    build:
      context: ./services/medisync
      dockerfile: Dockerfile
    container_name: medisync
    environment:
      - DEVICE=${DEVICE:-cpu}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONPATH=/app
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  medisync-ui:
    build:
      context: ./services/medisync
      dockerfile: Dockerfile.ui
    container_name: medisync-ui
    environment:
      - MEDISYNC_API_BASE=/medisync/api
      - MEDISYNC_WS_BASE=/medisync/ws
    networks:
      - frontend_net
    restart: unless-stopped
    depends_on:
      medisync:
        condition: service_healthy

  pulsenotes-ui:
    build:
      context: ./services/pulsenotes
      dockerfile: Dockerfile.ui
    container_name: pulsenotes-ui
    environment:
      - PULSENOTES_API_BASE=/pulsenotes/api
      - PULSENOTES_DATA_BASE=/pulsenotes
    networks:
      - frontend_net
    restart: unless-stopped
    depends_on:
      pulsenotes:
        condition: service_healthy

  landing-ui:
    build:
      context: ./services/landing
      dockerfile: Dockerfile
    container_name: landing-ui
    environment:
      - MEDISYNC_URL=/medisync/
      - CAREPLANPLUS_URL=/careplanplus/
      - PULSENOTES_URL=/pulsenotes/
      - MLFLOW_URL=/mlflow/
      - GRAFANA_URL=/grafana/
      - PROMETHEUS_URL=/prometheus/
    networks:
      - frontend_net
    restart: unless-stopped

  # ==========================================================================
  # Data Services
  # ==========================================================================
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    environment:
      - MONGO_INITDB_DATABASE=healthcare
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # MLflow & Model Registry
  # ==========================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow/mlflow.db
      - MLFLOW_ARTIFACT_ROOT=s3://mlflow-artifacts
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minio_admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minio_secret_password_change_me}
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root s3://mlflow-artifacts
      --host 0.0.0.0
      --port 5000
    depends_on:
      - minio
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minio_admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minio_secret_password_change_me}
      - MINIO_BROWSER_REDIRECT_URL=http://localhost:8090/minio/
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb myminio/mlflow-artifacts --ignore-existing;
      exit 0;
      "
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minio_admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minio_secret_password_change_me}
    networks:
      - backend_net

  # ==========================================================================
  # Monitoring
  # ==========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.external-url=http://localhost:8090/prometheus/'
      - '--web.route-prefix=/'
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:8090/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true

volumes:
  mongodb_data:
  redis_data:
  mlflow_data:
  minio_data:
  prometheus_data:
  grafana_data:
