version: '3.8'

# Production Docker Compose for GCP VM deployment
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # ==========================================================================
  # Reverse Proxy with SSL
  # ==========================================================================
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/conf.d:/etc/nginx/conf.d:ro
      - ./proxy/certs:/etc/nginx/certs:ro
      - ./demo-ui:/usr/share/nginx/html:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - pulseflow
      - careplanplus
      - pulsenotes
      - medisync
      - medisync-ui
    networks:
      - frontend_net
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./proxy/certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - frontend_net

  # ==========================================================================
  # Healthcare ML Services (Production)
  # ==========================================================================
  pulseflow:
    image: ${DOCKER_REGISTRY}/pulseflow:${VERSION:-latest}
    container_name: pulseflow
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=${MONGO_DB_HSE:-HSE}
      - MODEL_PATH=/app/models/lstm_model.pth
      - DEVICE=cpu
      - LOG_LEVEL=WARNING
      - WORKERS=2
    volumes:
      - ./models/pulseflow:/app/models:ro
    networks:
      - frontend_net
      - backend_net
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  careplanplus:
    image: ${DOCKER_REGISTRY}/careplanplus:${VERSION:-latest}
    container_name: careplanplus
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=${MONGO_DB_RECOMMENDER:-recommender_system}
      - MODEL_PATH=/app/models/bert_model.pth
      - DEVICE=cpu
      - LOG_LEVEL=WARNING
      - WORKERS=2
    volumes:
      - ./models/careplanplus:/app/models:ro
    networks:
      - frontend_net
      - backend_net
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  pulsenotes:
    image: ${DOCKER_REGISTRY}/pulsenotes:${VERSION:-latest}
    container_name: pulsenotes
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=${MONGO_DB_MIMIC:-mimic}
      - MODEL_PATH=/app/models/clinicalbert
      - DEVICE=cpu
      - LOG_LEVEL=WARNING
      - WORKERS=1
    volumes:
      - ./models/pulsenotes:/app/models:ro
    networks:
      - frontend_net
      - backend_net
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  medisync:
    image: ${DOCKER_REGISTRY}/medisync:${VERSION:-latest}
    container_name: medisync
    environment:
      - DEVICE=cpu
      - LOG_LEVEL=WARNING
      - PYTHONPATH=/app
    networks:
      - frontend_net
      - backend_net
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  medisync-ui:
    image: ${DOCKER_REGISTRY}/medisync-ui:${VERSION:-latest}
    container_name: medisync-ui
    environment:
      - MEDISYNC_API_BASE=/medisync/api
      - MEDISYNC_WS_BASE=/medisync/ws
    networks:
      - frontend_net
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================================================
  # Data Services (Production)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - backend_net
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================================================
  # MLflow (Production)
  # ==========================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    container_name: mlflow
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow/mlflow.db
      - MLFLOW_ARTIFACT_ROOT=s3://mlflow-artifacts
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root s3://mlflow-artifacts
      --host 0.0.0.0
      --port 5000
    depends_on:
      - minio
    networks:
      - backend_net
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - backend_net
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  # ==========================================================================
  # Monitoring (Production)
  # ==========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - backend_net
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${DOMAIN}/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - backend_net
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true

volumes:
  redis_data:
  mlflow_data:
  minio_data:
  prometheus_data:
  grafana_data:
  certbot_webroot:
