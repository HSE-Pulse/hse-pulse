apiVersion: v2
name: hse-pulse
description: HSE-Pulse Healthcare ML Platform - AI-powered healthcare services for the Irish Health Service Executive
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - healthcare
  - machine-learning
  - lstm
  - bert
  - reinforcement-learning
  - kubernetes
home: https://github.com/HSE-Pulse/hse-pulse
sources:
  - https://github.com/HSE-Pulse/hse-pulse
maintainers:
  - name: HSE-Pulse Team
    email: team@hse-pulse.io
dependencies:
  - name: mongodb
    version: "14.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: mongodb.enabled
  - name: redis
    version: "18.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
